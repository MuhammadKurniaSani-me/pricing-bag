name: Deploy Astro App to GitHub Pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

# --- NEW: Tell GitHub to use the modern Node 24 environment for its Actions ---
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # 1. NEW: Tell GitHub to use Node 22 to satisfy Astro's internal requirements
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            # 2. Setup Bun for lightning-fast package installation
            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            # 3. Install and Build using Bun
            - name: Install dependencies
              run: bun install

            - name: Build Astro site
              run: bun run build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "dist"

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
